<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Save the Date: Lena und Bastian heiraten am 07. August 2027.">
    <title>Save the Date | Lena & Bastian</title>
    <link rel="stylesheet" href="styles.css?v=5">
  </head>
  <body>
    <main class="page-shell" aria-labelledby="page-title">
      <section class="save-card">
        <div class="polaroid-wall" aria-label="Fotos von Lena und Bastian">
          <figure class="polaroid polaroid-one">
            <img src="assets/photo-01.jpeg?v=2" alt="Lena und Bastian lächeln gemeinsam in die Kamera">
            <figcaption>immer wir</figcaption>
          </figure>

          <figure class="polaroid polaroid-two">
            <img src="assets/photo-02.jpeg?v=2" alt="Lena und Bastian sitzen zusammen bei einem Abend im Freien">
            <figcaption>lieblingsmensch</figcaption>
          </figure>

          <figure class="polaroid polaroid-three">
            <img src="assets/photo-03.jpeg?v=2" alt="Ein spontanes Selfie von Lena und Bastian draußen">
            <figcaption>echt wir</figcaption>
          </figure>
        </div>

        <header class="hero-copy">
          <p class="eyebrow">Lena &amp; Bastian</p>
          <h1 id="page-title" aria-label="Save the Date">
            <span>Save</span>
            <em>the</em>
            <span>Date</span>
          </h1>
          <p class="date-line">Samstag, 07. August 2027</p>
        </header>

        <section class="details" aria-label="Countdown und Kalender">
          <p class="note">Wir heiraten. Haltet euch diesen Tag frei, die Details folgen.</p>

          <div class="countdown" aria-label="Countdown bis zum Hochzeitstag">
            <div class="countdown-item">
              <span id="days">000</span>
              <small>Tage</small>
            </div>
            <div class="countdown-item">
              <span id="hours">00</span>
              <small>Std.</small>
            </div>
            <div class="countdown-item">
              <span id="minutes">00</span>
              <small>Min.</small>
            </div>
            <div class="countdown-item">
              <span id="seconds">00</span>
              <small>Sek.</small>
            </div>
          </div>

          <a class="calendar-button" id="calendarButton" href="assets/save-the-date-lena-bastian.ics" download>
            <span class="calendar-mark" aria-hidden="true"></span>
            <span data-calendar-label>Zum Kalender hinzufügen</span>
          </a>
        </section>
      </section>
    </main>

    <script src="script.js?v=5"></script>
  </body>
</html>
